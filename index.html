<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ثبت دانش‌آموز</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>ثبت اطلاعات دانش‌آموز</h1>

    <form id="studentForm">
      <input id="name" type="text" placeholder="نام و نام خانوادگی" required />
      <input id="phone" type="text" placeholder="شماره موبایل" required />
      <input id="className" type="text" placeholder="کلاس" required />
      <button type="submit">ثبت</button>
    </form>

    <h2>لیست دانش‌آموزها</h2>
    <ul id="studentsList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
